name: Renovate

on:
  schedule:
    - cron: "0 5 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Renovate Config
        uses: suzuki-shunsuke/github-action-renovate-config-validator@v2.1.0

      - name: Run Renovate
        uses: renovatebot/github-action@v45.0.3
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
